name: Build database release

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-2025

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.14"
          check-latest: true
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Show tool versions
        run: |
          python --version
          python -m pip --version
          gh --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade -r requirements.txt

      - name: Set release version
        shell: pwsh
        run: |
          $version = "$(Get-Date -AsUTC -Format 'yyyyMMdd-HHmmss')-$($env:GITHUB_SHA.Substring(0, 7))"
          "RELEASE_VERSION=$version" >> $env:GITHUB_ENV

      - name: Export database
        run: python main.py

      - name: Publish release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "database-$env:RELEASE_VERSION"
          $assets = Get-ChildItem -Path output -Filter "*.zip" | ForEach-Object { $_.FullName }
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $assets --clobber
          } else {
            gh release create $tag $assets --title "Database $env:RELEASE_VERSION" --notes "Automated export for $env:GITHUB_SHA"
          }
